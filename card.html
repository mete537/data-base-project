<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
  >
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="../static/css/style.css">
  <title>Programcının kütüphanesi</title>
</head>
<body>
  <header class="header">
    <img src="../static/img/logo.svg" alt="logo" width="30" height="30">
    <ul class="main-list">
        <li class="list__item">
          <a href="/logout" class="logout-link">Çıkış Yap</a>
        </li>
    </ul>
  </header>
  <main class="main">
    {% block content %}
    <h1 class="main__title">{{card.title}}</h1>
    <div class="main__block">
      <h2 class="main__subtitle">{{card.subtitle}}</h2>
      <div class="main__text">
      {{card.text}}
      </div>
      <a class="main__link" href="/index">Kayıtlara geri dön</a>
    </div>
    {% endblock %}
  </main>
  <footer>

  </footer>
  
  <style>
    .logout-link {
      color: #F8FAFC;
      padding: 8px 16px;
      border: 1px solid rgba(16, 185, 129, 1);
      border-radius: 6px;
      transition: 0.2s;
    }

    .logout-link:hover {
      background: rgba(16, 185, 129, 1);
    }
  </style>
</body>
</html>
